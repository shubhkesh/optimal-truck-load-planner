version: '3.8'

services:
  load-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optimal-truck-load-planner
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
